name: myportfolio
description: "Personal portfolio mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  printing: ^5.13.1
  pdf: ^3.11.1
  file_saver: ^0.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/kidzcorner/
    - assets/gamma/
    - assets/living_bread/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_logo.png
  min_sdk_android: 21
